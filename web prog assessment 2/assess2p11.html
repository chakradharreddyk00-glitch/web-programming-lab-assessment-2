<!DOCTYPE html>
<html>
<head>
<title>Login Window</title>

<style>

/* Page background and center alignment */
body{
    display:flex;                 /* Enables flexible layout */
    justify-content:center;       /* Horizontal center */
    align-items:center;           /* Vertical center */
    height:100vh;                 /* Full screen height */
    background-color:#f2f2f2;
    font-family:Arial;
}

/* Login box styling */
.login-box{
    background:white;
    border:1px solid gray;
    padding:30px;
    text-align:center;
    width:250px;
}

/* Input field styling */
input{
    width:200px;
    padding:8px;
    margin:8px;
}

/* Login button styling */
button{
    padding:8px 15px;
}

/* Bottom right registration text */
.bottom-right{
    position:fixed;
    bottom:10px;
    right:10px;
}

</style>
</head>

<body>

<!-- Login container -->
<div class="login-box">

<h2>Login</h2>

<!-- Username input -->
<input type="text" placeholder="Username"><br>

<!-- Password input -->
<input type="password" placeholder="Password"><br>

<!-- Login button -->
<button>Login</button>

</div>

<!-- Registration number at bottom-right -->
<div class="bottom-right">
24BCE0040, K. Chakradhar Reddy
</div>

</body>
</html>
